<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
*{
    font-family: 'Poppins', sans-serif;
}

body{
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    margin: 0;
    color: #e0f7fa;
}

/* SIDEBAR */
.sidebar{
    position: fixed;
    left: 0;
    top: 0;
    width: 230px;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
}

.user-info-sidebar{
    color: #b2dfdb;
    font-size: 15px;
    margin-bottom: 25px;
    text-align: center;
    font-weight: 500;
}

.sidebar a{
    color: #e0f7fa;
    text-decoration: none;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar a:hover{
    background: rgba(29,233,182,0.2);
    transform: translateX(5px);
}

/* COLLAPSE */
.sidebar.collapsed{
    width: 70px;
}

.sidebar.collapsed a{
    text-align: center;
    font-size: 0;
}

.sidebar.collapsed a::before{
    font-size: 20px;
}

.sidebar.collapsed .user-info-sidebar{
    font-size: 0;
}

/* MAIN */
.main-content{
    margin-left: 230px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.main-content.expanded{
    margin-left: 70px;
}

/* TOGGLE */
.toggle-btn{
    position: absolute;
    top: 20px;
    left: 20px;
    background:none;
    border:none;
    font-size:22px;
    color:#1de9b6;
    cursor:pointer;
}

/* GLASS CARD */
.glass-card{
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 22px;
    padding: 40px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.35);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%{ transform: translateY(0px); }
    50%{ transform: translateY(-10px); }
    100%{ transform: translateY(0px); }
}

input{
    background: rgba(255,255,255,0.2)!important;
    color:white!important;
    border:none!important;
}

/* BUTTON */
.btn-custom{
    background: linear-gradient(45deg, #1de9b6, #00e5ff);
    border: none;
    padding: 10px;
    border-radius: 25px;
    color: #00363a;
    transition: 0.3s;
}

.btn-custom:hover{
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"><br><br>

    <div class="user-info-sidebar">
        {% if username %}
        {{ username }}
        {% else %}
        User
        {% endif %}
    </div>

    <a href="/profile">👤 Profile</a>
    <a href="/Predict">📩 Analyze Email</a>
    <a href="/history">📊 History</a>
    <a href="/starred">⭐ Starred</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- TOGGLE -->
<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<!-- MAIN -->
<div class="main-content" id="main">

    <div class="glass-card animate__animated animate__fadeInUp">

        <h3 class="text-center mb-4">👤 Profile</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" value="{{ username }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="text" value="{{ email }}" class="form-control" readonly>
            </div>

            <a href="/change-password" class="btn btn-warning w-100 mb-3">
                Change Password
            </a>

            <button class="btn-custom w-100">Update Profile</button>

        </form>

    </div>

</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main").classList.toggle("expanded");
}

let params = new URLSearchParams(window.location.search);

if(params.get("success")){
Swal.fire("Success","Profile updated 🎉","success");
}

if(params.get("error") === "username"){
Swal.fire("Error","Username too short ❌","error");
}
</script>

</body>
</html>

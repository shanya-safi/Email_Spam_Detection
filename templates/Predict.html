<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyze Email</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #e0f7fa;
            margin: 0;
        }

        /* SIDEBAR */
        .sidebar{
            position: fixed;
            left: 0;
            top: 0;
            width: 230px;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .user-info-sidebar{
            color: #b2dfdb;
            text-align: center;
            margin-bottom: 25px;
        }

        .sidebar a{
            color: #e0f7fa;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .sidebar a:hover{
            background: rgba(29,233,182,0.2);
        }

        /* COLLAPSE */
        .sidebar.collapsed{
            width: 70px;
        }

        .sidebar.collapsed a{
            font-size: 0;
        }

        .sidebar.collapsed .user-info-sidebar{
            font-size: 0;
        }

        /* MAIN */
        .main-content{
            margin-left: 230px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content.expanded{
            margin-left: 70px;
        }

        /* TOGGLE BUTTON */
        .toggle-btn{
            position: fixed;
            top: 20px;
            left: 20px;
            background:none;
            border:none;
            font-size:22px;
            color:#1de9b6;
            cursor:pointer;
            z-index: 1000;
        }

        /* CARD */
        .glass-card{
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }

        textarea{
            border-radius: 15px !important;
            resize: none;
            border: none;
            padding: 15px;
            background: rgba(255,255,255,0.9);
        }

        textarea:focus{
            box-shadow: 0 0 15px rgba(29,233,182,0.6);
            border: none;
        }

        .btn-submit{
            background: linear-gradient(45deg, #1de9b6, #00e5ff);
            border: none;
            padding: 12px 32px;
            border-radius: 30px;
            color: #00363a;
        }

        .btn-clear{
            background: transparent;
            border: 1px solid #1de9b6;
            padding: 12px 32px;
            border-radius: 30px;
            color: #1de9b6;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"><br><br>

    <div class="user-info-sidebar">
        {% if username %}
        {{ username }}
        {% else %}
        User
        {% endif %}
    </div>

    <a href="/profile">👤 Profile</a>
    <a href="/Predict">📩 Analyze Email</a>
    <a href="/history">📊 History</a>
    <a href="/starred">⭐ Starred</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- TOGGLE -->
<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<!-- MAIN -->
<div class="main-content" id="main">

    <div class="glass-card animate__animated animate__fadeInUp">

        <h2 class="text-center mb-4">
            🧠 <span style="color:#1de9b6;">Analyze Email Content</span>
        </h2>

        <form method="POST" action="/Predict">

            <textarea
                name="email"
                rows="6"
                placeholder="Paste or type your email content here..."
                class="form-control mb-4"
                required></textarea>

            <div class="text-center">
                <button type="submit" class="btn btn-submit me-2">
                    Submit & Analyze 
                </button>

                <button type="reset" class="btn btn-clear">
                    Clear
                </button>
            </div>

        </form>

    </div>

</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main").classList.toggle("expanded");
}
</script>

</body>
</html>

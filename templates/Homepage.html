<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Spam Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Animate -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0f7fa;
            position: relative;
        }

        /*  TOP BAR */
        .top-bar{
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info{
            color: #b2dfdb;
            font-size: 14px;
        }

        .logout-btn{
            background: linear-gradient(45deg, #1de9b6, #00e5ff); /* SAME as btn-custom */
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #00363a;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logout-btn:hover{
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0,229,255,0.6);
        }

            /* CARD */
        .glass-card{
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
            animation: float 3s ease-in-out infinite;
            text-align: center;
        }

        @keyframes float {
            0%{ transform: translateY(0px); }
            50%{ transform: translateY(-12px); }
            100%{ transform: translateY(0px); }
        }

        .app-title{
            font-weight: 600;
            font-size: 2.2rem;
        }

        .highlight{
            color: #1de9b6;
        }

        .btn-custom{
            background: linear-gradient(45deg, #1de9b6, #00e5ff);
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            border-radius: 30px;
            color: #00363a;
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .btn-custom:hover{
            transform: scale(1.12);
            box-shadow: 0 12px 30px rgba(0,229,255,0.6);
        }

        .icon{
            font-size: 60px;
            margin-bottom: 15px;
            color: #1de9b6;
        }
    </style>
</head>

<body>

    <div class="top-bar">

        {% if email %}
            <div class="user-info">
                {{ email }}
            </div>
        {% else %}
            <div class="user-info">
                User
            </div>
        {% endif %}
    
        <a href="/logout" class="logout-btn">
             Logout
        </a>
    </div>

<!-- MAIN CARD -->
<div class="glass-card animate__animated animate__fadeInUp">

    <!-- ICON -->
    <div class="icon animate__animated animate__pulse animate__infinite">
        🧠
    </div>

    <!-- TITLE -->
    <h1 class="app-title">
        Email <span class="highlight">Spam Detection</span>
    </h1>

    <!-- DESCRIPTION -->
    <p class="mt-3">
        Detect unwanted emails using  
        <span class="highlight">AI & Machine Learning</span>.
    </p>

    <!-- BUTTONS -->
    <div class="mt-4 d-flex justify-content-center gap-3 flex-wrap">

        <a href="/Predict" class="btn-custom">
            Analyze Email 
        </a>

        <a href="/history" class="btn-custom">
             View History
        </a>

    </div>

</div>

</body>
</html>

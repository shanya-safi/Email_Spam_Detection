<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
*{font-family:'Poppins',sans-serif;}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#e0f7fa;
}

.glass-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:40px;
    width:350px;
    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

.title{
    font-weight:600;
    font-size:1.8rem;
    text-align:center;
}

.highlight{
    color:#1de9b6;
}

input{
    border-radius:12px !important;
    padding:12px;
}

.btn-custom{
    background:linear-gradient(45deg,#1de9b6,#00e5ff);
    border:none;
    border-radius:30px;
    padding:10px;
    font-weight:500;
    color:#00363a;
    transition:0.3s;
}

.btn-custom:hover{
    transform:scale(1.08);
    box-shadow:0 10px 25px rgba(0,229,255,0.5);
}

.is-invalid{
    border:2px solid red !important;
}

.text-danger{
    font-size:13px;
}
</style>
</head>

<body>

<div class="glass-card animate__animated animate__fadeInUp">

<h3 class="title mb-4"><span class="highlight">Login</span></h3>

<form method="POST" onsubmit="return validateLogin()" novalidate>

    <input type="text" id="email" name="email"
       class="form-control mb-1"
       placeholder="Enter Email"
       autocomplete="off">

    <div id="emailError" class="text-danger mb-2"></div>

    <input type="password" id="password" name="password"
       class="form-control mb-1"
       placeholder="Enter Password"
       autocomplete="new-password">

    <div id="passError" class="text-danger mb-3"></div>

    <!-- BACKEND ERROR -->
    {% if error %}
    <div class="text-danger mb-3">{{ error }}</div>
    {% endif %}

    <button class="btn btn-custom w-100">Login</button>

</form>

<p class="mt-3 text-center">
    Do not have an account?
    <a href="/signup" class="highlight">Signup</a>
</p>

<p class="text-center">
    <a href="/forgot" class="highlight">Forgot Password</a>
</p>

</div>

<script>
function validateLogin(){

    let email = document.getElementById("email");
    let password = document.getElementById("password");

    let emailError = document.getElementById("emailError");
    let passError = document.getElementById("passError");

    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    email.classList.remove("is-invalid");
    password.classList.remove("is-invalid");
    emailError.innerText = "";
    passError.innerText = "";

    let valid = true;

    if(!emailPattern.test(email.value)){
        email.classList.add("is-invalid");
        emailError.innerText = "Enter valid email";
        valid = false;
    }

    if(password.value.trim() === ""){
        password.classList.add("is-invalid");
        passError.innerText = "Password required";
        valid = false;
    }

    return valid;
}
</script>

</body>
</html>

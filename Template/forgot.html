<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
*{font-family:'Poppins',sans-serif;}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#e0f7fa;
}

.glass-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:40px;
    width:100%;
    max-width:400px;
    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

.title{font-weight:600;font-size:1.8rem;}
.highlight{color:#1de9b6;}

input{
    border-radius:12px !important;
    padding:12px;
}

.btn-custom{
    background:linear-gradient(45deg,#1de9b6,#00e5ff);
    border:none;
    border-radius:30px;
    padding:10px;
    color:#00363a;
}
</style>
</head>

<body>

<div class="glass-card text-center animate__animated animate__fadeInUp">

<h2 class="title"><span class="highlight">Forgot Password</span></h2>

<form method="POST" action="/forgot">
    <input type="email" name="email" class="form-control mb-3"
           placeholder="Enter Email" required>

    <button class="btn btn-custom w-100">Send OTP</button>
</form>

<p class="mt-3">
    Back to <a href="/login" class="highlight">Login</a>
</p>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0f7fa;
        }

        .glass-card{
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            padding: 45px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
            text-align: center;
        }

        h2{
            font-weight: 600;
        }

        .result-box{
            background: rgba(255,255,255,0.08);
            border: 2px solid #1de9b6;
            color: #b9fff0;
            padding: 25px;
            border-radius: 15px;
            font-size: 1.3rem;
            margin-top: 20px;
        }

        .email-box{
            background: rgba(255,255,255,0.06);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.95rem;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }

        .btn-back{
            background: linear-gradient(45deg, #1de9b6, #00e5ff);
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            border-radius: 30px;
            color: #00363a;
            transition: 0.4s;
        }

        .btn-back:hover{
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,229,255,0.6);
        }
    </style>
</head>

<body>

<div class="glass-card">

    <h2 class="mb-4">
        <span style="color:#1de9b6;">Prediction Result</span>
    </h2>

    <!-- RESULT -->
    <div class="result-box">
        <strong>Result:</strong> {{ prediction }} <br>
        <strong>Spam Probability:</strong> {{ probability }}
    </div>

    <!-- EMAIL CONTENT -->
    <div class="email-box">
        <strong>Email Content:</strong><br>
        {{ email }}
    </div>

    <!-- BACK BUTTON -->
    <a href="/Predict" class="btn btn-back mt-3">
        Check Another Email
    </a>

    <a href="/history" class="btn btn-back mt-3">
        View History
    </a>

</div>

</body>
</html>

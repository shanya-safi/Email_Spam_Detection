<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analyze Email</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0f7fa;
        }

        .glass-card{
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }

        h2{
            font-weight: 600;
        }

        textarea{
            border-radius: 15px !important;
            resize: none;
            border: none;
            padding: 15px;
            background: rgba(255,255,255,0.9);
        }

        textarea:focus{
            box-shadow: 0 0 15px rgba(29,233,182,0.6);
            border: none;
        }

        .btn-submit{
            background: linear-gradient(45deg, #1de9b6, #00e5ff);
            border: none;
            padding: 12px 32px;
            border-radius: 30px;
            font-weight: 500;
            color: #00363a;
            transition: 0.4s;
        }

        .btn-submit:hover{
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0,229,255,0.6);
        }

        .btn-clear{
            background: transparent;
            border: 1px solid #1de9b6;
            padding: 12px 32px;
            border-radius: 30px;
            color: #1de9b6;
            transition: 0.4s;
        }

        .btn-clear:hover{
            background: #1de9b6;
            color: #00363a;
        }
    </style>
</head>

<body>

<div class="glass-card animate__animated animate__fadeInUp">

    <h2 class="text-center mb-4">
        🧠 <span style="color:#1de9b6;">Analyze Email Content</span>
    </h2>

    <!-- FLASK FORM -->
    <form method="POST" action="/Predict">

        <textarea
            name="email"
            rows="6"
            placeholder="Paste or type your email content here..."
            class="form-control mb-4"
            required></textarea>

        <div class="text-center">
            <button type="submit" class="btn btn-submit me-2">
                Submit & Analyze 
            </button>

            <button type="reset" class="btn btn-clear">
                Clear
            </button>
        </div>

    </form>

</div>

</body>
</html>

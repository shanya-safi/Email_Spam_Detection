<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
*{font-family:'Poppins',sans-serif;}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#e0f7fa;
}

.glass-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:40px;
    width:100%;
    max-width:400px;
    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

.title{font-weight:600;font-size:1.8rem;}
.highlight{color:#1de9b6;}

input{
    border-radius:12px !important;
    padding:12px;
}

.btn-custom{
    background:linear-gradient(45deg,#1de9b6,#00e5ff);
    border:none;
    border-radius:30px;
    padding:10px;
    color:#00363a;
}

.is-invalid{
    border:2px solid red !important;
}

.text-danger{
    font-size:13px;
}
</style>
</head>

<body>

<div class="glass-card text-center animate__animated animate__fadeInUp">

<h2 class="title"><span class="highlight">Reset Password</span></h2>

<form method="POST" action="/reset-password" onsubmit="return validatePassword()">

    <!-- Password -->
    <input type="password" id="pass" name="password"
           class="form-control mb-1"
           placeholder="New Password" required>
    <div id="passError" class="text-danger mb-2"></div>

    <!-- Confirm Password -->
    <input type="password" id="cpass" name="confirm_password"
           class="form-control mb-1"
           placeholder="Confirm Password" required>
    <div id="cpassError" class="text-danger mb-2"></div>

    <button class="btn btn-custom w-100">Update Password</button>

</form>

</div>

<script>

// same pattern as signup
let passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#^]).{8,}$/;

// LIVE PASSWORD VALIDATION
document.getElementById("pass").addEventListener("input", function(){
    let pass = this;
    let passError = document.getElementById("passError");

    if(pass.value === ""){
        pass.classList.remove("is-invalid");
        passError.innerText = "";
        return;
    }

    if(!passwordPattern.test(pass.value)){
        pass.classList.add("is-invalid");
        passError.innerText = "Password must include uppercase, lowercase, number & special character (min 8)";
    } else {
        pass.classList.remove("is-invalid");
        passError.innerText = "";
    }
});

// LIVE CONFIRM PASSWORD CHECK
document.getElementById("cpass").addEventListener("input", function(){
    let pass = document.getElementById("pass").value;
    let cpass = this;
    let error = document.getElementById("cpassError");

    if(cpass.value === ""){
        cpass.classList.remove("is-invalid");
        error.innerText = "";
        return;
    }

    if(pass !== cpass.value){
        cpass.classList.add("is-invalid");
        error.innerText = "Passwords do not match";
    } else {
        cpass.classList.remove("is-invalid");
        error.innerText = "";
    }
});

// SUBMIT VALIDATION
function validatePassword(){

    let pass = document.getElementById("pass");
    let cpass = document.getElementById("cpass");

    let passError = document.getElementById("passError");
    let cpassError = document.getElementById("cpassError");

    pass.classList.remove("is-invalid");
    cpass.classList.remove("is-invalid");
    passError.innerText = "";
    cpassError.innerText = "";

    let valid = true;

    // strong password check
    if(!passwordPattern.test(pass.value)){
        pass.classList.add("is-invalid");
        passError.innerText = "Enter strong password";
        valid = false;
    }

    // match check
    if(pass.value !== cpass.value){
        cpass.classList.add("is-invalid");
        cpassError.innerText = "Passwords do not match";
        valid = false;
    }

    return valid;
}
</script>

</body>
</html>

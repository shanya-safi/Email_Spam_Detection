<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
*{font-family:'Poppins',sans-serif;}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#e0f7fa;
}

.glass-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:40px;
    width:100%;
    max-width:400px;
    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

.title{
    font-weight:600;
    font-size:1.8rem;
}

.highlight{color:#1de9b6;}

input{
    border-radius:12px !important;
    padding:12px;
}

.btn-custom{
    background:linear-gradient(45deg,#1de9b6,#00e5ff);
    border:none;
    border-radius:30px;
    padding:10px;
    font-weight:500;
    color:#00363a;
    transition:0.3s;
}

.btn-custom:hover{
    transform:scale(1.08);
    box-shadow:0 10px 25px rgba(0,229,255,0.5);
}
</style>
</head>

<body>

<div class="glass-card text-center animate__animated animate__fadeInUp">

    <h2 class="title">
        <span class="highlight"> Sign Up </span>
    </h2>

    <form method="POST" class="mt-4" onsubmit="return validateForm()">

        <!-- Email -->
        <input type="email" id="email" name="email"
               class="form-control mb-1"
               placeholder="Enter Email" required>
        <div id="emailError" class="text-danger mb-2" style="font-size:13px;"></div>

        <!-- Password -->
        <input type="password" id="password" name="password"
               class="form-control mb-1"
               placeholder="Create Password" required>
        <div id="passError" class="text-danger mb-3" style="font-size:13px;"></div>

        <button class="btn btn-custom w-100">
            Signup
        </button>

    </form>

    <p class="mt-3">
        Already have an account?
        <a href="/login" class="highlight">Login</a>
    </p>

</div>

<!-- JS VALIDATION -->
<script>

// allowed domains
let allowedDomains = ["gmail.com", "yahoo.com", "outlook.com", "icloud.com"];

// email regex
let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

// password regex
let passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#^]).{8,}$/;


// 🔴 LIVE EMAIL VALIDATION
document.getElementById("email").addEventListener("input", function(){

    let email = this;
    let value = email.value.trim().toLowerCase();
    let emailError = document.getElementById("emailError");

    email.classList.remove("is-invalid");
    emailError.innerText = "";

    if(value === "") return;

    // no spaces
    if(value.includes(" ")){
        email.classList.add("is-invalid");
        emailError.innerText = "Email should not contain spaces";
        return;
    }

    // format
    if(!emailPattern.test(value)){
        email.classList.add("is-invalid");
        emailError.innerText = "Invalid email format";
        return;
    }

    // no double dots
    if(value.includes("..")){
        email.classList.add("is-invalid");
        emailError.innerText = "Email cannot contain '..'";
        return;
    }

    let domain = value.split("@")[1];

    // allowed domain check
    if(!allowedDomains.includes(domain)){
        email.classList.add("is-invalid");
        emailError.innerText = "Only gmail, yahoo, outlook, icloud allowed";
        return;
    }

});


// 🔴 LIVE PASSWORD CLEAR ERROR
document.getElementById("password").addEventListener("input", function(){
    this.classList.remove("is-invalid");
    document.getElementById("passError").innerText = "";
});


// 🔴 FINAL SUBMIT VALIDATION
function validateForm() {

    let email = document.getElementById("email");
    let password = document.getElementById("password");

    let emailError = document.getElementById("emailError");
    let passError = document.getElementById("passError");

    let valid = true;

    email.classList.remove("is-invalid");
    password.classList.remove("is-invalid");

    emailError.innerText = "";
    passError.innerText = "";

    let value = email.value.trim().toLowerCase();

    // email checks
    if(!emailPattern.test(value) || value.includes(" ") || value.includes("..")){
        email.classList.add("is-invalid");
        emailError.innerText = "Enter valid email";
        valid = false;
    } else {
        let domain = value.split("@")[1];
        if(!allowedDomains.includes(domain)){
            email.classList.add("is-invalid");
            emailError.innerText = "Use gmail, yahoo, outlook or icloud only";
            valid = false;
        }
    }

    // password checks
    if (!passwordPattern.test(password.value)) {
        password.classList.add("is-invalid");
        passError.innerText = "Password must include uppercase, lowercase, number & special character (min 8)";
        valid = false;
    }

    return valid;
}
</script>

</body>
</html>
